name: Update Collection

on:
  push:
    branches: [main]
    paths:
      - 'data/collection.csv'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2dc359ef8d4b9761767  # v5.3.0
        with:
          python-version: '3.11'

      - name: Run update script
        run: python3 update.py data/collection.csv

      - name: Commit generated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add countries/ sitemap.xml index.html
          git diff --cached --quiet || git commit -m "Update collection - $(date +%Y-%m-%d)"
          git push
